
# .github/actions/common/action.yml (composite action)
#
# Shared Build Setup: Provides common steps for Docker/Nuke builds in CI workflows.
#
# Steps included:
#   - Set up Docker Buildx for advanced Docker builds
#   - Install .NET SDK 8.x for building .NET projects
#   - Install global .NET tools: GitVersion.Tool and Nuke.GlobalTool
#
# Usage:
#   - Reference this action in your workflow with:
#       uses: ./.github/actions/common
#   - Place a checkout step before this action in your workflow.

name: Shared Build Setup
description: Common steps for Docker/Nuke builds

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Install .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x

    - name: Install .NET Tools
      run: |
        dotnet tool install --global GitVersion.Tool
        dotnet tool install --global Nuke.GlobalTool
      shell: bash