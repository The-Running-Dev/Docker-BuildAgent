
# Documentation Deployment Workflow
#
# This workflow builds and deploys the project documentation to GitHub Pages using Docusaurus.
# It's triggered automatically by the Release workflow when documentation changes are detected,
# or can be run manually for on-demand documentation updates.
#
# Workflow Configuration:
#   - Name: Docs
#   - Triggers:
#     * Manual dispatch (workflow_dispatch) for on-demand documentation builds
#     * Repository dispatch with 'Update-Documentation' event (triggered by Release workflow)
#   - Permissions: packages:write, contents:write, pages:write, id-token:write
#
# Build Process:
#   1. Checkout repository with full git history
#   2. Build documentation using node-template-build command in build-agent container
#   3. Upload generated documentation as GitHub Pages artifact
#   4. Deploy artifact to GitHub Pages environment
#
# Build Configuration:
#   - Uses ghcr.io/the-running-dev/build-agent:latest container for consistent builds
#   - Executes node-template-build with documentation directory target
#   - Builds Docusaurus site from ./documentation directory
#   - Outputs static files to ./documentation/build
#
# Deployment Target:
#   - GitHub Pages environment with custom domain support
#   - Automatic URL generation and deployment verification
#   - Pages deployment with proper permissions and token verification
#
# Notes:
#   - Automatically triggered when Release workflow detects documentation changes
#   - Can be manually triggered for immediate documentation updates
#   - Uses the same build-agent container as the main build process
#   - Deploys to github-pages environment with URL output
#
name: Docs

on:
  workflow_dispatch:
  repository_dispatch:
    types: [Update-Documentation]

permissions:
  packages: write
  contents: write

jobs:
  Build-Docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/the-running-dev/build-agent:latest
  
    steps:
      # Checkout the repository with full git history for GitVersion
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build documentation using node-template-build in the build-agent container
      - name: Build Documentation Site
        run: node-template-build -appDir 'documentation'

      # Upload the built documentation for GitHub Pages deployment
      - name: Upload Documentation Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/build

  deploy:
    name: Deploy to GitHub Pages
    needs: Build-Docs

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      # Deploy the uploaded documentation artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4