
# Continuous Deployment Workflow
#
# This workflow handles continuous deployment for the Docker Build Agent project.
# It builds and publishes Docker images to the container registry on every main branch push,
# but does NOT create GitHub releases (use the "Create Release" workflow for that).
#
# Workflow Configuration:
#   - Name: Deploy
#   - Triggers:
#     * Manual dispatch (workflow_dispatch) for on-demand deployments
#     * Automatic execution on pushes to the main branch
#   - Ignores: Changes only to documentation/ and .github/ directories
#   - Permissions: packages:write, contents:write for registry push
#
# Deployment Process:
#   1. Checkout repository with full git history for proper versioning
#   2. Execute shared setup actions (.github/actions/common)
#   3. Run comprehensive test suite with coverage reporting
#   4. Build and publish Docker images to container registry (NO release creation)
#   5. Detect documentation changes and trigger docs rebuild if needed
#
# Quality Assurance:
#   - Executes all test projects before deployment
#   - Generates coverage reports for release validation
#   - Ensures only tested code reaches production
#   - Validates build integrity before publishing artifacts
#
# Environment Variables:
#   - GITHUB_TOKEN: GitHub authentication for releases and API access
#   - RegistryToken: Container registry authentication token
#   - NotificationsWebHookUrl: Discord webhook for deployment notifications
#
# Release Artifacts:
#   - Docker images pushed to GitHub Container Registry (ghcr.io)
#   - GitHub release with semantic versioning and changelog
#   - Git tags created automatically via GitVersion
#   - Discord notifications for successful deployments
#   - Test and coverage reports for release validation
#
# Documentation Integration:
#   - Automatically detects documentation changes in commits
#   - Triggers documentation site rebuild when docs are updated
#   - Maintains documentation synchronization with releases
#
# Notes:
#   - Only runs on main branch pushes or manual triggers
#   - Creates production releases with --create-github-release flag
#   - Automatically triggers documentation deployment if docs changed
#   - Uses GitVersion for semantic versioning and changelog generation
#   - Includes comprehensive testing before any deployment
#   - Fails fast if tests don't pass, preventing broken releases
#
name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'documentation/**'
      - '.github/**'

permissions:
  packages: write
  contents: write
  checks: write
  pull-requests: write

jobs:
  Build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository with full git history for GitVersion and changelog generation
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Execute shared setup steps (Docker, .NET, GitVersion, etc.)
      - name: Setup Environment
        uses: ./.github/actions/common

      # Execute tests steps
      - name: Tests & Coverage
        uses: ./.github/actions/tests

      # Build and Publish (No Release Creation)
      - name: Build and Publish
        run: nuke --type docker --create-github-release false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RegistryToken: ${{ secrets.REGISTRY_TOKEN }}
          NotificationsWebHookUrl: ${{ secrets.NOTIFICATIONS_WEBHOOK_URL }}

      # Check if documentation files were modified in this commit
      - name: Check for Documentation Changes
        id: docs-changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^documentation/'; then
            echo "Documentation changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No documentation changes found"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Trigger documentation site rebuild if docs were updated
      - name: Trigger Documentation Build
        if: steps.docs-changed.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: Update-Documentation