name: Docker-CI


on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  packages: write
  contents: write

jobs:
  Release-Build:
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/workflows/_shared-setup.yml

      - name: Run NUKE Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RegistryToken: ${{ secrets.REGISTRY_TOKEN }}
          NotificationsWebHookUrl: ${{ secrets.NOTIFICATIONS_WEBHOOK_URL }}
        run: nuke --type docker