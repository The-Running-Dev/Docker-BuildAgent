
# CI-Build: Main continuous integration workflow for Docker images and Nuke builds. Ignores changes in the 'documentation' directory.
#
# Triggers:
#   - On workflow_dispatch (manual)
#   - On pull requests
#   - On any branch push (but job runs only once per PR)
#
# Steps:
#   1. Checks out the repository
#   2. Runs shared setup steps from .github/actions/common
#   3. Runs the Nuke build in docker dry-run mode
#
name: CI-Build

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - 'documentation/**'
  push:
    branches:
      - '**'
    paths-ignore:
      - 'documentation/**'

permissions:
  packages: write
  contents: write

jobs:
  Build:
    runs-on: ubuntu-latest

    # Skip push events if there's an open PR (to avoid duplicate runs)
    if: github.event_name != 'push' || github.event.pull_request == null

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/common

      - name: Run NUKE Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RegistryToken: ${{ secrets.REGISTRY_TOKEN }}
          NotificationsWebHookUrl: ${{ secrets.NOTIFICATIONS_WEBHOOK_URL }}
        run: nuke --type docker --dry-run true