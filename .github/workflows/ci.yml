name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**'

permissions:
  packages: write

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Install .NET Tools and Setup PATH
        run: |
          TOOL_PATH="$HOME/.dotnet/tools"

          dotnet tool install --global GitVersion.Tool
          ln -sf "$TOOL_PATH/dotnet-gitversion" "$TOOL_PATH/gitversion"

          dotnet tool install --global Nuke.GlobalTool
          
          echo "$TOOL_PATH" >> $GITHUB_PATH
        shell: bash

      - name: Run NUKE BuildAndPush
        env:
          GitHubPackagesToken: ${{   secrets.GITHUBPACKAGESTOKEN }}
        run: nuke --target BuildAndPush
