name: PR-Build

on:
  pull_request:

permissions:
  packages: write
  contents: write

jobs:
  PullRequest-Build:
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/common

      - name: Build Container
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nuke --type docker --dry-run true
