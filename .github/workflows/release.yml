
# Release: Publishes Docker images and creates a GitHub release on tag push or manual trigger. Ignores changes in the 'documentation' directory.
#
# Triggers:
#   - On workflow_dispatch (manual)
#   - On push of tags starting with 'v'
#
# Steps:
#   1. Checks out the repository
#   2. Runs shared setup steps from .github/actions/common
#   3. Runs the Nuke build with GitHub release creation enabled
#
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - 'documentation/**'

permissions:
  packages: write
  contents: write

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/common

      - name: Run NUKE Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RegistryToken: ${{ secrets.REGISTRY_TOKEN }}
          NotificationsWebHookUrl: ${{ secrets.NOTIFICATIONS_WEBHOOK_URL }}
        run: nuke --type docker --create-github-release true