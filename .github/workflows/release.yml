# Manual Release Creation Workflow
#
# This workflow creates official releases for the Docker Build Agent project.
# It is triggered manually when you want to create a new release version.
#
# Features:
#   - Manual trigger with optional version override
#   - Comprehensive testing before release
#   - Docker image building and publishing
#   - GitHub release creation with changelog
#   - Semantic versioning with GitVersion
#
# Usage:
#   1. Go to Actions tab in GitHub
#   2. Select "Create Release" workflow
#   3. Click "Run workflow"
#   4. Optionally specify a custom version (e.g., v1.2.3)
#   5. Click "Run workflow" button
#
# The workflow will:
#   - Run all tests to ensure quality
#   - Build and publish Docker images
#   - Create a GitHub release with auto-generated changelog
#   - Tag the repository with the version number

name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (optional, leave empty for auto-version)'
        required: false
        type: string
      prerelease:
        description: 'Mark as Pre-Release'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Custom Release Notes (optional)'
        required: false
        type: string

permissions:
  packages: write
  contents: write
  checks: write
  pull-requests: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      # Checkout with full history for GitVersion
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup build environment
      - name: Setup Build Environment
        uses: ./.github/actions/common

      # Run tests to ensure quality
      - name: Run Tests & Generate Coverage
        uses: ./.github/actions/tests

      # Build and create release
      - name: Build and Create Release
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "Using custom version: ${{ github.event.inputs.version }}"
            nuke --type docker --create-github-release true --version "${{ github.event.inputs.version }}" --pre-release "${{ github.event.inputs.prerelease }}"
          else
            echo "Using GitVersion for automatic versioning"
            nuke --type docker --create-github-release true --pre-release "${{ github.event.inputs.prerelease }}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RegistryToken: ${{ secrets.REGISTRY_TOKEN }}
          NotificationsWebHookUrl: ${{ secrets.NOTIFICATIONS_WEBHOOK_URL }}

      # Trigger documentation build if needed
      - name: Trigger Documentation Build
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: Update-Documentation
